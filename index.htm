<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>😂 Random Joke Generator</h1>
            
            <div class="controls">
                <select id="categorySelect">
                    <option value="">Any Category</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
                
                <label class="toggle">
                    <input type="checkbox" id="safeMode">
                    <span>Safe Mode</span>
                </label>
            </div>

            <div id="jokeContainer" class="joke-box">
                <p>Click "Get Joke" to start laughing! 🎭</p>
            </div>

            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="copyBtn" class="btn btn-secondary">📋 Copy</button>
            </div>

            <div id="loader" class="loader"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
